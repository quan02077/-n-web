<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - Basau Sneakers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Oswald:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="stylesMain.css">
    <link rel="stylesheet" href="cart.css">

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<body class="fs-5">
    <div class="container my-5" style="min-height: 60vh;">
        <h2 class="fw-bold oswald-font mb-4">THÔNG TIN THANH TOÁN</h2>

        <div class="row">
            <div class="col-md-7">
                <form id="checkoutForm" class="p-4 border rounded shadow-sm bg-white" onsubmit="return processCheckout(event)">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên người nhận</label>
                        <input type="text" class="form-control" id="cusName" required placeholder="VD: Nguyễn Văn A">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số điện thoại</label>
                        <input type="tel" class="form-control" id="cusPhone" required placeholder="VD: 0901234567">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Địa chỉ Email (Để nhận hóa đơn)</label>
                        <input type="email" class="form-control" id="cusEmail" required
                            placeholder="VD: emailcuaban@gmail.com">
                    </div>
                    <div class="mb-3">
                        <div class="row g-2 mb-3">
                            <div class="col-12"><label class="form-label fw-bold">Địa chỉ giao hàng</label></div>
                            <div class="col-md-4">
                                <select class="form-select" id="citySelect" required onchange="handleCityChange(this)">
                                    <option value="" selected disabled>Chọn Tỉnh / Thành</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select class="form-select" id="districtSelect" required disabled onchange="handleDistrictChange(this)">
                                    <option value="" selected disabled>Chọn Quận / Huyện</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select class="form-select" id="wardSelect" required disabled>
                                    <option value="" selected disabled>Chọn Phường / Xã</option>
                                </select>
                            </div>
                            <div class="col-12 mt-2">
                                <input type="text" class="form-control" id="homeAddress" required
                                    placeholder="Số nhà, Tên đường...">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 fw-bold fs-5 mt-3 py-2" id="btnSubmitOrder">CHẤP
                        NHẬN THANH TOÁN</button>
                </form>
            </div>

            <div class="col-md-5 mt-4 mt-md-0">
                <div class="p-4 border rounded shadow-sm bg-light">
                    <h5 class="fw-bold mb-3 border-bottom pb-2 fs-5">Đơn hàng của bạn</h5>
                    <div id="checkoutItems" class="mt-3">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
