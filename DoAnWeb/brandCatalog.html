                            <div class="color-swatch" style="background:#000" title="Đen" onclick="toggleColor(this)"></div>
                            <div class="color-swatch" style="background:#fff" title="Trắng" onclick="toggleColor(this)"></div>

                    <!-- Sale & Offers -->

                        <button class="filter-title" onclick="toggleGroup(this)">

            </div>

            <!-- PRODUCT AREA -->

                    <select class="sort-select" id="sortSelect" onchange="applySort()">

            </div>

    </div>

    <!-- FOOTER -->
    <div class="footer container-fluid bg-secondary text-white py-4">
        <p class="oswald-font fw-bold mb-1 footer_name">BASAU.</p>
        <p class="small mb-0 text-center">© 2026 BASAU SNEAKERS. All rights reserved.</p>
    </div>
</div>

    { id: 20, brand: "Onitsuka Tiger", name: "Serrano Retro", category: "Sneakers", gender: "Unisex", price: 2800000, badge: null, img: "hinhAnh/otSerrano.png", colors: ["Trắng","Xanh dương"] },
    { id: 21, brand: "Onitsuka Tiger", name: "Ultimate 81", category: "Classic", gender: "Nam", price: 3500000, badge: "new", img: "hinhAnh/astrograbber.png", colors: ["Xanh dương","Trắng"] },

    // === CONVERSE ===
    { id: 22, brand: "Converse", name: "Chuck Taylor All Star '70 Hi", category: "Classic", gender: "Unisex", price: 2100000, badge: "bestseller", img: "hinhAnh/airMaxPlus.png", colors: ["Đen","Trắng"] },
    { id: 23, brand: "Converse", name: "Chuck 70 Low Top Canvas", category: "Classic", gender: "Unisex", price: 1900000, badge: null, img: "hinhAnh/killshot2.png", colors: ["Trắng"] },
    { id: 24, brand: "Converse", name: "Run Star Motion Ox", category: "Sneakers", gender: "Nữ", price: 2350000, badge: "sale", oldPrice: 2800000, img: "hinhAnh/astrograbber.png", colors: ["Trắng","Đen"] },
];

// State
let currentBrand = 'all';
let currentSort = 'featured';
let selectedColors = [];
let displayedProducts = [...allProducts];

// ============================================================
// FILTER LOGIC
// ============================================================
function getCheckedValues(name) {
    return [...document.querySelectorAll(`.filter-check input[value]:checked`)]
        .filter(cb => {
            const val = cb.value;
            // Determine which group this belongs to
            const group = cb.closest('.filter-group');
            return group !== null;
        })
        .map(cb => cb.value);
}

function getCheckedByValues(values) {
    return [...document.querySelectorAll('.filter-check input[type="checkbox"]:checked')].map(cb => cb.value);
}

function applyFilters() {
    const checked = [...document.querySelectorAll('.filter-check input[type="checkbox"]:checked')].map(cb => cb.value);
    const genders = checked.filter(v => ['Nam','Nữ','Unisex'].includes(v));
    const categories = checked.filter(v => ['Sneakers','Running','Classic','Sandal','Lifestyle'].includes(v));
    const prices = checked.filter(v => ['under1m','1m-2m','2m-3m','3m-5m','over5m'].includes(v));
    const offers = checked.filter(v => ['sale','new','bestseller'].includes(v));

    let filtered = allProducts.filter(p => {
        if (currentBrand !== 'all' && p.brand !== currentBrand) return false;
        if (genders.length && !genders.includes(p.gender)) return false;
        if (categories.length && !categories.includes(p.category)) return false;
        if (prices.length) {
            const inRange = prices.some(range => {
                if (range === 'under1m') return p.price < 1000000;
                if (range === '1m-2m') return p.price >= 1000000 && p.price <= 2000000;
                if (range === '2m-3m') return p.price > 2000000 && p.price <= 3000000;
                if (range === '3m-5m') return p.price > 3000000 && p.price <= 5000000;
                if (range === 'over5m') return p.price > 5000000;
                return false;
            });
            if (!inRange) return false;
        }
        if (offers.length) {
            const matchOffer = offers.some(o => {
                if (o === 'sale') return p.badge === 'sale';
                if (o === 'new') return p.badge === 'new';
                if (o === 'bestseller') return p.badge === 'bestseller';
                return false;
            });
            if (!matchOffer) return false;
        }
        if (selectedColors.length) {
            const match = selectedColors.some(c => p.colors && p.colors.includes(c));
            if (!match) return false;
        }
        return true;
    });

    displayedProducts = filtered;
    applySort(false);
    renderActiveFilters(genders, categories, prices, offers);
}

function applySort(reFilter = false) {
    if (reFilter) applyFilters();

    const sortVal = document.getElementById('sortSelect')?.value || document.getElementById('sortSelectMobile')?.value || 'featured';
    currentSort = sortVal;

    let sorted = [...displayedProducts];
    if (sortVal === 'price-asc') sorted.sort((a,b) => a.price - b.price);
    else if (sortVal === 'price-desc') sorted.sort((a,b) => b.price - a.price);
    else if (sortVal === 'newest') sorted.sort((a,b) => (b.badge === 'new' ? 1 : 0) - (a.badge === 'new' ? 1 : 0));

    renderProducts(sorted);
}

function renderActiveFilters(genders, categories, prices, offers) {
    const container = document.getElementById('activeFilters');
    if (!container) return;
    container.innerHTML = '';
    const allActive = [...genders, ...categories, ...prices, ...offers, ...selectedColors];
    const labelMap = { 'under1m': 'Dưới 1tr', '1m-2m': '1tr–2tr', '2m-3m': '2tr–3tr', '3m-5m': '3tr–5tr', 'over5m': 'Trên 5tr', 'sale': 'Giảm giá', 'new': 'Mới về', 'bestseller': 'Bán chạy' };
    allActive.forEach(val => {
        const pill = document.createElement('div');
        pill.className = 'filter-pill';
        pill.innerHTML = `${labelMap[val] || val} <span class="remove" onclick="removeFilter('${val}')">×</span>`;
        container.appendChild(pill);
    });
}

function removeFilter(val) {
    const checkbox = document.querySelector(`.filter-check input[value="${val}"]`);
    if (checkbox) { checkbox.checked = false; applyFilters(); return; }
    const idx = selectedColors.indexOf(val);
    if (idx > -1) {
        selectedColors.splice(idx, 1);
        document.querySelectorAll('.color-swatch').forEach(s => { if (s.title === val) s.classList.remove('active'); });
        applyFilters();
    }
}

function clearAllFilters() {
    document.querySelectorAll('.filter-check input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    selectedColors = [];
    applyFilters();
}

function toggleColor(el) {
    el.classList.toggle('active');
    const color = el.title;
    const idx = selectedColors.indexOf(color);
    if (idx > -1) selectedColors.splice(idx, 1); else selectedColors.push(color);
    applyFilters();
}

function selectBrand(el) {
    document.querySelectorAll('.brand-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentBrand = el.dataset.brand;

    const titleEl = document.getElementById('pageTitle');
    const breadEl = document.getElementById('breadcrumbCurrent');
    titleEl.textContent = currentBrand === 'all' ? 'Tất cả sản phẩm' : `Giày ${currentBrand}`;
    breadEl.textContent = currentBrand === 'all' ? 'Tất cả thương hiệu' : currentBrand;

    applyFilters();
}

// ============================================================
// RENDER
// ============================================================
function formatPrice(p) {
    return p.toLocaleString('vi-VN') + '₫';
}

function renderProducts(products) {
    const grid = document.getElementById('productGrid');
    const noResults = document.getElementById('noResults');
    const count = document.getElementById('resultCount');

    count.textContent = `(${products.length} sản phẩm)`;

    if (products.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('d-none');
        return;
    }
    noResults.classList.add('d-none');

    grid.innerHTML = products.map(p => {
        const badgeHtml = p.badge
            ? `<div class="card-badge badge-${p.badge}">${p.badge === 'bestseller' ? 'Bán chạy' : p.badge === 'new' ? 'Mới về' : 'SALE'}</div>`
            : '';
        const priceHtml = p.oldPrice
            ? `<span class="card-price sale-price">${formatPrice(p.price)}</span><span class="card-price-old">${formatPrice(p.oldPrice)}</span>`
            : `<span class="card-price">${formatPrice(p.price)}</span>`;
        const catLabel = { 'Running': 'Giày chạy bộ', 'Classic': 'Giày cổ điển', 'Sneakers': 'Sneakers', 'Sandal': 'Dép / Sandal', 'Lifestyle': 'Lifestyle' }[p.category] || p.category;

        return `
        <a href="productDetail.html?id=${p.id}" class="text-decoration-none">
            <div class="product-card-cat">
                ${badgeHtml}
                <button class="wishlist-btn" onclick="event.preventDefault(); this.textContent='♥'; this.style.color='#f25722';" title="Yêu thích">♡</button>
                <div class="img-wrap">
                    <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x300/f5f5f5/ccc?text=${encodeURIComponent(p.brand)}'">
                </div>
                <div class="card-info">
                    <div class="card-brand">${p.brand}</div>
                    <div class="card-name">${p.name}</div>
                    <div class="card-cat">${catLabel} · ${p.gender}</div>
                    <div class="d-flex align-items-baseline">${priceHtml}</div>
                </div>
            </div>
        </a>`;
    }).join('');
}

// ============================================================
// UI HELPERS
// ============================================================
function toggleGroup(btn) {
    btn.classList.toggle('collapsed');
    const opts = btn.nextElementSibling;
    opts.style.display = btn.classList.contains('collapsed') ? 'none' : '';
}

function toggleFilter() {
    const sidebar = document.getElementById('filterSidebar');
    sidebar.classList.toggle('show');
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    applyFilters();

    // Check URL params for brand
    const params = new URLSearchParams(window.location.search);
    const brandParam = params.get('brand');
    if (brandParam) {
        const tab = document.querySelector(`.brand-tab[data-brand="${brandParam}"]`);
        if (tab) selectBrand(tab);
    }

    // Login state
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (currentUser) {
        const el = document.getElementById('userAccountText');
        if (el) el.textContent = currentUser.username;
    }
});
</script>
</body>
</html>
