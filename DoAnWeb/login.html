<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylesLogin.css">
</head>
<body>
    <header class="border-bottom py-3">
        <div class="container d-flex justify-content-center align-items-center">
            <img src="hinhAnh/logo.jpg" alt="thuongHieu" class="logo-img me-4">
            <h1 class="header-title mb-0">What's up!</h1>
        </div>
    </header>

    <div class="loginBanner position-relative">
        <img src="hinhAnh/loginBanner.jpg" alt="loginBanner" class="w-100 h-100 object-fit-cover">
        <div class="title position-absolute top-50 translate-middle-y">
            <h1 id="pageTitle" class="banner-text">Đăng nhập</h1>
        </div>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <form id="loginForm">
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white"><img src="hinhAnh/userIcon.png" width="25"></span>
                        <input type="text" class="form-control" id="username" placeholder="Nhập username hoặc email">
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white"><img src="hinhAnh/passwordIcon.png" width="25"></span>
                        <input type="password" class="form-control password-field" id="password" placeholder="Mật khẩu">
                    </div>
                    
                    <div class="form-check form-switch mb-3 ms-1">
                        <input class="form-check-input custom-switch border-dark" type="checkbox" role="switch" id="showPassLogin">
                        <label class="form-check-label" for="showPassLogin">Hiện mật khẩu</label>
                    </div>

                    <div class="input-group mb-4">
                        <span class="input-group-text bg-white"><img src="hinhAnh/roleIcon.png" width="25"></span>
                        <select class="form-select" id="roleSelection">
                            <option value="Nhân viên">Nhân viên</option>
                            <option value="Khách hàng">Khách hàng</option>
                        </select>
                    </div>

                    <button type="button" class="btn btn-dark w-100 fw-bold py-2 fs-5" id="loginBtn" onclick="login()">Đăng nhập</button>
                    
                    <div class="d-flex justify-content-between mt-3">
                        <a href="#" class="text-dark text-decoration-none fw-medium" onclick="showRegisterForm()">Đăng ký ngay</a>
                        <a href="#" class="text-dark text-decoration-none fw-medium" onclick="showForgotForm()">Quên mật khẩu?</a>
                    </div>
                </form>

                <form id="forgotForm" class="d-none">
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white"><img src="hinhAnh/userIcon.png" width="25"></span>
                        <input type="text" class="form-control" id="forgotUsername" placeholder="Nhập username hoặc email">
                    </div>
                    
                    <div id="passBox" class="d-none flex-column w-100">
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white"><img src="hinhAnh/passwordIcon.png" width="25"></span>
                            <input type="password" class="form-control password-field" id="newPassword" placeholder="Mật khẩu mới">
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white"><img src="hinhAnh/comfirmPassword.png" width="25"></span>
                            <input type="password" class="form-control password-field" id="confirmPassword" placeholder="Xác nhận mật khẩu">
                        </div>
                        <div class="form-check form-switch mb-3 ms-1">
                            <input class="form-check-input custom-switch border-dark" type="checkbox" role="switch" id="showPassForgot">
                            <label class="form-check-label" for="showPassForgot">Hiện mật khẩu</label>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-dark w-100 fw-bold py-2 fs-5 mt-2" id="forgotBtn" onclick="forgotPassword()">Kiểm tra</button>
                    <div class="text-end mt-3">
                        <a href="#" class="text-dark text-decoration-none fw-medium" onclick="showLoginForm()">Quay lại đăng nhập</a>
                    </div>
                </form>

                <form id="registerForm" class="d-none">
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white"><img src="hinhAnh/email.png" width="25"></span>
                        <input type="email" class="form-control" id="registerEmail" placeholder="Nhập email">
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white"><img src="hinhAnh/userIcon.png" width="25"></span>
                        <input type="text" class="form-control" id="registerUsername" placeholder="Nhập username">
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white"><img src="hinhAnh/passwordIcon.png" width="25"></span>
                        <input type="password" class="form-control password-field" id="registerPassword" placeholder="Mật khẩu">
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-white"><img src="hinhAnh/comfirmPassword.png" width="25"></span>
                        <input type="password" class="form-control password-field" id="registerConfirmPassword" placeholder="Xác nhận mật khẩu">
                    </div>
                    
                    <div class="form-check form-switch mb-3 ms-1">
                        <input class="form-check-input custom-switch border-dark" type="checkbox" role="switch" id="showPassReg">
                        <label class="form-check-label" for="showPassReg">Hiện mật khẩu</label>
                    </div>

                    <div class="input-group mb-4">
                        <span class="input-group-text bg-white"><img src="hinhAnh/roleIcon.png" width="25"></span>
                        <select class="form-select" id="registerRoleSelection">
                            <option value="Nhân viên">Nhân viên</option>
                            <option value="Khách hàng">Khách hàng</option>
                        </select>
                    </div>

                    <button type="button" class="btn btn-dark w-100 fw-bold py-2 fs-5" id="registerBtn" onclick="register()">Đăng ký</button>
                    <div class="text-end mt-3">
                        <a href="#" class="text-dark text-decoration-none fw-medium" onclick="showLoginForm()">Quay lại đăng nhập</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
