<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Basau Sneakers</title>
    <!--font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet">
    <!--bootstrap-->
    <link href="bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <!--css-->
    <link rel="stylesheet" href="stylesMain.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="stylesDetail.css">
    <link rel="stylesheet" href="sidepanels.css">
</head>

<body>
    <div class="container-fluid p-0">

        <div id="main-header"></div>

        <div class="container-fluid px-4 px-md-5">

            <div class="row mt-5 mx-0">

                <div class="col-md-6 text-center">
                    <div class="main-img-container bg-light rounded">
                        <img src="" id="mainProductImg" class="img-fluid p-5">
                    </div>
                </div>

                <div class="col-md-5 ps-md-5 mt-4 mt-md-0">
                    <div class="product-info">
                        <p class="text-danger fw-bold mb-1" id="productCategory">Category</p>
                        <h2 class="fw-bold oswald-font" id="productName">Product Name</h2>
                        <h4 class="fw-bold my-3" id="productPrice">Price</h4>

                        <div class="d-flex justify-content-between mt-4">
                            <p class="fw-bold">Chọn Size</p>
                        </div>
                        <div class="row g-2" id="sizeGrid">
                            <div class="col-4"><button class="btn btn-outline-dark w-100 py-3 size-btn"
                                    onclick="selectSize(this)">EU 35.5</button></div>
                            <div class="col-4"><button class="btn btn-outline-dark w-100 py-3 size-btn"
                                    onclick="selectSize(this)">EU 36</button></div>
                            <div class="col-4"><button class="btn btn-outline-dark w-100 py-3 size-btn"
                                    onclick="selectSize(this)">EU 36.5</button></div>
                            <div class="col-4"><button class="btn btn-outline-dark w-100 py-3 size-btn"
                                    onclick="selectSize(this)">EU 37.5</button></div>
                            <div class="col-4"><button class="btn btn-outline-dark w-100 py-3 size-btn"
                                    onclick="selectSize(this)">EU 38</button></div>
                            <div class="col-4"><button class="btn btn-outline-dark w-100 py-3 size-btn"
                                    onclick="selectSize(this)">EU 38.5</button></div>
                        </div>

                        <div class="mt-5 d-grid gap-2">
                            <button class="btn btn-dark btn-lg rounded-pill py-3 fw-bold" onclick="addToCart()">Thêm vào
                                giỏ hàng</button>
                            <button class="btn btn-outline-dark rounded-pill py-3 fw-bold"
                                onclick="toggleCurrentFavorite()">Yêu thích ♡</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-5 pt-5 border-top mb-5 mx-0">
                <div class="col-12 d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold m-0 oswald-font">Có thể bạn cũng thích</h4>
                </div>

                <div class="col-12 d-flex flex-nowrap overflow-auto hide-scrollbar gap-3" id="relatedProducts">
                </div>
            </div>
        </div>
        <div class="footer container-fluid bg-secondary text-white py-5 mt-5 text-center">
            <a href="homePage.html" class="footer-logo-link text-decoration-none">
                <h1 class="oswald-font fw-bold mb-2 footer-logo-text">BASAU.</h1>
            </a>
            <p class="small mb-0" style="cursor: default; opacity: 0.8;">© 2026 BASAU SNEAKERS. All rights reserved.</p>
        </div>
    </div>


    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="header.js"></script>
    <script src="data.js"></script>
    <script src="admin.js"></script>
    <script src="cart.js"></script>
    <script src="favourite.js"></script>
    <script src="account.js"></script>
    <script src="scriptDetail.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
